<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2025年A股上市公司补税公告全景</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1"></script>
<style>
:root {
    --bg-primary: #0f1923;
    --bg-card: #1a2735;
    --bg-header: #0d1b2a;
    --text-primary: #e0e6ed;
    --text-secondary: #8899aa;
    --text-muted: #5a6a7a;
    --border: #253545;
    --accent: #4fc3f7;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg-primary); color:var(--text-primary); }

.dashboard-container { max-width:1440px; margin:0 auto; padding:20px 24px; }
.dashboard-header {
    background: linear-gradient(135deg, #0d1b2a, #1a2735);
    padding: 24px 28px; border-radius: 12px; margin-bottom: 20px;
    border: 1px solid var(--border);
}
.dashboard-header h1 { font-size:22px; font-weight:700; color:#fff; }
.header-subtitle { font-size:13px; color:var(--text-secondary); margin-top:4px; }

.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:20px; }
.kpi-card { background:var(--bg-card); border-radius:10px; padding:20px; border:1px solid var(--border); }
.kpi-label { font-size:12px; color:var(--text-secondary); margin-bottom:6px; }
.kpi-value { font-size:26px; font-weight:700; color:#fff; }
.kpi-sub { font-size:12px; color:var(--text-muted); }

.chart-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
@media (max-width:900px) { .chart-row { grid-template-columns:1fr; } }
.chart-container { background:var(--bg-card); border-radius:10px; padding:20px 24px; border:1px solid var(--border); }
.chart-title { font-size:14px; font-weight:600; color:var(--text-primary); margin-bottom:16px; }
.chart-title .accent { width:3px; height:16px; background:var(--accent); border-radius:2px; display:inline-block; margin-right:8px; vertical-align:middle; }
.chart-container canvas { max-height:340px; }

.table-section { background:var(--bg-card); border-radius:10px; padding:20px 24px; border:1px solid var(--border); overflow-x:auto; }
.table-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.table-title { font-size:14px; font-weight:600; }
.table-extra { font-size:12px; color:var(--text-secondary); }
.data-table { width:100%; border-collapse:collapse; font-size:13px; }
.data-table thead th { text-align:left; padding:10px 12px; border-bottom:2px solid var(--border); color:var(--text-secondary); font-weight:600; font-size:11px; letter-spacing:0.8px; white-space:nowrap; }
.data-table tbody td { padding:8px 12px; border-bottom:1px solid rgba(255,255,255,0.04); }
.data-table tbody tr:hover { background:rgba(79,195,247,0.05); }
.month-badge { display:inline-block; padding:2px 6px; border-radius:3px; font-size:11px; }
.m1 { background:rgba(79,195,247,0.15); color:#4fc3f7; }
.m2 { background:rgba(129,199,132,0.15); color:#81c784; }
.m3 { background:rgba(255,183,77,0.15); color:#ffb74d; }
.m4 { background:rgba(229,115,115,0.15); color:#e57373; }
.m5 { background:rgba(186,104,200,0.15); color:#ba68c8; }
.m6 { background:rgba(77,182,172,0.15); color:#4db6ac; }
.m7 { background:rgba(255,138,101,0.15); color:#ff8a65; }
.m8 { background:rgba(161,136,127,0.15); color:#a1887f; }
.m9 { background:rgba(100,181,246,0.15); color:#64b5f6; }
.m10 { background:rgba(240,98,146,0.15); color:#f06292; }
.m11 { background:rgba(255,213,79,0.15); color:#ffd54f; }
.m12 { background:rgba(128,222,234,0.15); color:#80deea; }
.footer { text-align:center; padding:20px; color:var(--text-muted); font-size:12px; }
.pdf-link { color:var(--accent); text-decoration:none; font-size:14px; }
.pdf-link:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="dashboard-container">

<header class="dashboard-header">
    <h1>📊 2025年A股上市公司补税公告全景</h1>
    <div class="header-subtitle">数据来源：巨潮资讯网公告 · 标题含"补税/补缴税款"关键词 · 金额需查阅PDF正文确认</div>
</header>

<section class="kpi-row">
    <div class="kpi-card">
        <div class="kpi-label">🏢 公告公司总数</div>
        <div class="kpi-value" id="kpi-total">—</div>
    </div>
    <div class="kpi-card">
        <div class="kpi-label">📅 覆盖月份</div>
        <div class="kpi-value" id="kpi-months">—</div>
    </div>
    <div class="kpi-card">
        <div class="kpi-label">📄 PDF公告</div>
        <div class="kpi-value">73份</div>
        <div class="kpi-sub">已归档</div>
    </div>
    <div class="kpi-card">
        <div class="kpi-label">⚡ 月均公告数</div>
        <div class="kpi-value" id="kpi-avg">—</div>
    </div>
</section>

<section class="chart-row">
    <div class="chart-container">
        <div class="chart-title"><span class="accent"></span>各月公告数量分布</div>
        <canvas id="month-chart"></canvas>
    </div>
    <div class="chart-container">
        <div class="chart-title"><span class="accent"></span>下半年占比</div>
        <canvas id="half-chart"></canvas>
    </div>
</section>

<section class="table-section">
    <div class="table-header">
        <div class="table-title">📋 完整公司列表</div>
        <div class="table-extra">共 <span id="table-count">0</span> 家</div>
    </div>
    <table class="data-table">
        <thead>
            <tr>
                <th>#</th><th>公司名称</th><th>代码</th><th>公告月份</th><th>公告日期</th><th>PDF</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</section>

<footer class="footer">数据截止 2025年12月31日 · 金额需查阅PDF正文</footer>
</div>

<script>
const DATA = [
];
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const MONTH_CLS = ['m1','m2','m3','m4','m5','m6','m7','m8','m9','m10','m11','m12'];

class Dashboard {
    constructor(data) {
        this.data = data;
        this.init();
    }
    init() {
        this.renderKPI();
        this.renderChart();
        this.renderHalfChart();
        this.renderTable();
    }
    renderKPI() {
        const d = this.data;
        document.getElementById('kpi-total').textContent = d.length;
        const mset = new Set(d.map(r => r.m));
        document.getElementById('kpi-months').textContent = mset.size + '个月';
        document.getElementById('kpi-avg').textContent = (d.length / Math.max(mset.size,1)).toFixed(1);
    }
    getMonthCounts() {
        return MONTHS.map(m => this.data.filter(r => r.m === m).length);
    }
    renderChart() {
        const ctx = document.getElementById('month-chart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: MONTHS,
                datasets: [{
                    label: '公告数',
                    data: this.getMonthCounts(),
                    backgroundColor: MONTHS.map((_,i) => {
                        const colors = ['#4fc3f7','#81c784','#ffb74d','#e57373','#ba68c8','#4db6ac','#ff8a65','#a1887f','#64b5f6','#f06292','#ffd54f','#80deea'];
                        return colors[i] + 'CC';
                    }),
                    borderRadius: 4,
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false },
                    tooltip: { callbacks: { label: ctx => ctx.parsed.y + ' 家' } }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#8899aa', font: { size: 12 } } },
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8899aa', stepSize: 1 } }
                }
            }
        });
    }
    renderHalfChart() {
        const ctx2 = document.getElementById('half-chart').getContext('2d');
        const h1 = this.data.filter(r => ['1月','2月','3月','4月','5月','6月'].includes(r.m)).length;
        const h2 = this.data.length - h1;
        new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['上半年 (1-6月)', '下半年 (7-12月)'],
                datasets: [{
                    data: [h1, h2],
                    backgroundColor: ['#4fc3f7CC', '#ffb74dCC'],
                    borderColor: '#1a2735', borderWidth: 2,
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false, cutout: '55%',
                plugins: {
                    legend: { position: 'right', labels: { color: '#e0e6ed', padding: 12, usePointStyle: true } },
                    tooltip: {
                        callbacks: {
                            label: ctx => {
                                const total = ctx.dataset.data.reduce((a,b)=>a+b,0);
                                return `${ctx.label}: ${ctx.parsed} 家 (${(ctx.parsed/total*100).toFixed(1)}%)`;
                            }
                        }
                    }
                }
            }
        });
    }
    renderTable() {
        document.getElementById('table-count').textContent = this.data.length;
        let html = '';
        this.data.forEach((r, i) => {
            const mi = MONTHS.indexOf(r.m);
            const cls = mi >= 0 ? MONTH_CLS[mi] : 'm1';
            const pdfName = encodeURIComponent(r.name) + '_' + r.code + '_' + r.date.replace(/[^\d]/g,'') + '.pdf';
            const pdfUrl = 'https://github.com/ChordZippo/tax_company/raw/main/%E8%A1%A5%E7%A8%8E%E5%85%AC%E5%91%8APDF_2025/' + pdfName;
            html += `<tr>
                <td>${i+1}</td>
                <td><strong>${r.name}</strong></td>
                <td style="color:var(--text-muted)">${r.code}</td>
                <td><span class="month-badge ${cls}">${r.m}</span></td>
                <td style="color:var(--text-secondary)">${r.date}</td>
                <td><a href="${pdfUrl}" target="_blank" class="pdf-link">📄</a></td>
            </tr>`;
        });
        document.getElementById('table-body').innerHTML = html;
    }
}
</script>
<script src="data_2025.js"></script>
</body>
</html>
